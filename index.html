<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Access Hub</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161822;
            --accent-color: #00a3ff; /* Стильный голубой вместо оранжевого */
            --accent-hover: #0082cc;
            --text-color: #ffffff;
            --text-muted: #8b8e99;
            --error-color: #ff3333;
            --success-color: #00cc66;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 163, 255, 0.1);
            text-align: center;
        }

        h1 { font-size: 28px; margin-bottom: 10px; font-weight: 700; }
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 163, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .btn:hover { transform: translateY(-2px); background: var(--accent-hover); box-shadow: 0 6px 20px rgba(0, 163, 255, 0.5); }
        .btn:disabled { background: #444; box-shadow: none; cursor:not-allowed; }
        
        .btn-google {
            background: #ffffff;
            color: #1f2230;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }
        .btn-google:hover {
            background: #f1f3f4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }
        .btn-google svg {
            width: 20px;
            height: 20px;
        }

        .btn-secondary { background: #222533; color: white; box-shadow: none; margin-top: 10px; }
        .btn-secondary:hover { background: #2c3044; box-shadow: none; transform: none; }

        .hidden { display: none !important; }

        /* Кабинет пользователя */
        .user-info { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 12px; margin-bottom: 25px; text-align: left; }
        .user-info img { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; }
        .user-details { flex-grow: 1; }
        .user-name { font-weight: 600; font-size: 14px; }
        .logout-btn { background: none; border: none; color: var(--error-color); cursor: pointer; font-size: 12px; }

        .key-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--accent-color);
            padding: 20px;
            border-radius: 14px;
            margin-top: 20px;
            word-break: break-all;
            font-family: monospace;
            font-size: 15px;
        }
        .expiry-text { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

        /* Админ-панель */
        .admin-panel { margin-top: 30px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .admin-panel h2 { font-size: 20px; margin-bottom: 15px; color: var(--accent-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        input, select { width: 100%; background: #1f2230; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; font-size: 14px; }
        input:focus, select:focus { border-color: var(--accent-color); outline: none; }
        
        .list-item { background: #1f2230; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .delete-btn { background: var(--error-color); border: none; color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Экран логина -->
        <div id="login-screen">
            <h1>VPN Access</h1>
            <p>Войдите через Google, чтобы получить свой персональный ключ доступа.</p>
            <button class="btn btn-google" id="login-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                Войти через Google
            </button>
        </div>

        <!-- Экран блокировки -->
        <div id="blocked-screen" class="hidden">
            <h1 style="color: var(--error-color);">Доступ ограничен</h1>
            <p>Ваш аккаунт был заблокирован администратором.</p>
        </div>

        <!-- Главный экран пользователя -->
        <div id="main-screen" class="hidden">
            <div class="user-info">
                <img id="user-avatar" src="" alt="Avatar">
                <div class="user-details">
                    <div class="user-name" id="user-display-name">User Name</div>
                    <button class="logout-btn" id="logout-btn">Выйти</button>
                </div>
            </div>

            <h1>Ваш VPN Доступ</h1>
            <p>Нажмите кнопку ниже, чтобы привязать и получить ключ.</p>
            
            <button class="btn" id="get-key-btn">Получить ключ доступа</button>

            <div id="key-result-container" class="hidden">
                <div class="key-box" id="key-display">Ключ появится тут...</div>
                <div class="expiry-text" id="expiry-display">Истекает: --.--.----</div>
                <button class="btn btn-secondary" id="action-btn">Скопировать ключ</button>
            </div>

            <!-- Админ-интерфейс -->
            <div id="admin-section" class="hidden admin-panel">
                <h2>Панель администратора</h2>
                
                <!-- Добавление ключа -->
                <div class="form-group">
                    <label>Добавить новый ключ / ссылку</label>
                    <input type="text" id="new-key-value" placeholder="ss://... или https://...">
                </div>
                <div class="form-group">
                    <label>Тип данных</label>
                    <select id="new-key-type">
                        <option value="key">Просто текст (Ключ)</option>
                        <option value="link">Ссылка (Кнопка перехода)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Дата истечения</label>
                    <input type="datetime-local" id="new-key-expiry">
                </div>
                <button class="btn" id="add-key-btn" style="margin-bottom: 20px;">Добавить ключ в пул</button>

                <!-- Управление юзерами -->
                <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:5px;">Управление пользователями</label>
                <div id="users-list"></div>
            </div>
        </div>
    </div>

    <!-- Подключение Firebase SDK v12 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, getDocs, where, addDoc, limit } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ ТВОЕГО ПРОЕКТА FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBJUAa0gk3KPWTgFgLaMmqP5bBVmbTDUDo",
            authDomain: "vpnserver-9683d.firebaseapp.com",
            projectId: "vpnserver-9683d",
            storageBucket: "vpnserver-9683d.firebasestorage.app",
            messagingSenderId: "1034189638147",
            appId: "1:1034189638147:web:7ce35f797deba835e8dc36",
            measurementId: "G-NDG4X24M8M"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ТВОЙ EMAIL ДЛЯ ИДЕНТИФИКАЦИИ АДМИНА
        const ADMIN_EMAIL = "tvf2232@gmail.com"; 

        let currentUser = null;
        let userKeyData = null;

        // Элементы UI
        const loginScreen = document.getElementById('login-screen');
        const mainScreen = document.getElementById('main-screen');
        const blockedScreen = document.getElementById('blocked-screen');
        const adminSection = document.getElementById('admin-section');
        
        // Авторизация через Мобильный Редирект (чтобы не было ошибок сессии)
        document.getElementById('login-btn').addEventListener('click', () => {
            signInWithRedirect(auth, provider)
                .catch((error) => {
                    alert("Ошибка Firebase при клике: " + error.code + "\n" + error.message);
                });
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth)
                .catch((error) => alert("Ошибка при выходе: " + error.message));
        });

        // Проверяем результат возврата на сайт после авторизации Google
        getRedirectResult(auth)
            .then((result) => {
                if (result) {
                    console.log("Успешно вернулись после авторизации!");
                }
            })
            .catch((error) => {
                alert("Ошибка обработки входа Google:\nКод: " + error.code + "\nСообщение: " + error.message);
            });

        // Слушатель состояния пользователя
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userDocRef);
                    
                    let userData;
                    
                    if (!userDoc.exists()) {
                        const isCurrentUserAdmin = (user.email === ADMIN_EMAIL);
                        
                        userData = { 
                            name: user.displayName || "Пользователь без имени", 
                            email: user.email, 
                            isAdmin: isCurrentUserAdmin, 
                            isBlocked: false 
                        };
                        await setDoc(userDocRef, userData);
                    } else {
                        userData = userDoc.data();
                        
                        if (user.email === ADMIN_EMAIL && !userData.isAdmin) {
                            userData.isAdmin = true;
                            await updateDoc(userDocRef, { isAdmin: true });
                        }
                    }

                    if (userData.isBlocked) {
                        loginScreen.classList.add('hidden');
                        mainScreen.classList.add('hidden');
                        blockedScreen.classList.remove('hidden');
                        return;
                    }

                    document.getElementById('user-avatar').src = user.photoURL || 'https://via.placeholder.com/36';
                    document.getElementById('user-display-name').textContent = user.displayName || user.email;
                    loginScreen.classList.add('hidden');
                    blockedScreen.classList.add('hidden');
                    mainScreen.classList.remove('hidden');

                    if (userData.isAdmin) {
                        adminSection.classList.remove('hidden');
                        loadAdminPanel();
                    }

                    checkUserKey();
                } catch (dbError) {
                    alert("Ошибка Firestore: " + dbError.message + "\n\nУбедитесь, что Rules (Правила) в Firestore открыты!");
                }
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                mainScreen.classList.add('hidden');
                blockedScreen.classList.add('hidden');
                adminSection.classList.add('hidden');
            }
        });

        // Проверка привязанного ключа
        async function checkUserKey() {
            try {
                const q = query(collection(db, "vpn_keys"), where("userId", "==", currentUser.uid), limit(1));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        renderKey(doc.data());
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderKey(data) {
            userKeyData = data;
            document.getElementById('get-key-btn').classList.add('hidden');
            const container = document.getElementById('key-result-container');
            const display = document.getElementById('key-display');
            const expiry = document.getElementById('expiry-display');
            const actionBtn = document.getElementById('action-btn');

            container.classList.remove('hidden');
            display.textContent = data.value;
            
            if (data.expiresAt && typeof data.expiresAt.toDate === 'function') {
                const date = data.expiresAt.toDate();
                expiry.textContent = `Истекает: ${date.toLocaleDateString()} в ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            } else {
                expiry.textContent = "Срок действия не указан";
            }

            if (data.type === 'link') {
                actionBtn.textContent = "Перейти по ссылке";
                actionBtn.onclick = () => window.open(data.value, '_blank');
            } else {
                actionBtn.textContent = "Скопировать ключ";
                actionBtn.onclick = () => {
                    navigator.clipboard.writeText(data.value);
                    actionBtn.textContent = "Скопировано!";
                    setTimeout(() => actionBtn.textContent = "Скопировать ключ", 2000);
                };
            }
        }

        // Забрать ключ из пула
        document.getElementById('get-key-btn').addEventListener('click', async () => {
            try {
                const q = query(collection(db, "vpn_keys"), where("userId", "==", ""), limit(1));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const keyDoc = querySnapshot.docs[0];
                    await updateDoc(doc(db, "vpn_keys", keyDoc.id), {
                        userId: currentUser.uid
                    });
                    renderKey({ ...keyDoc.data(), userId: currentUser.uid });
                } else {
                    alert("Свободных ключей пока нет. Обратитесь к администратору.");
                }
            } catch (keyErr) {
                alert("Ошибка выдачи ключа: " + keyErr.message);
            }
        });

        // Панель админа
        async function loadAdminPanel() {
            try {
                const usersSnapshot = await getDocs(collection(db, "users"));
                const listContainer = document.getElementById('users-list');
                listContainer.innerHTML = "";

                usersSnapshot.forEach((userDoc) => {
                    if (userDoc.id === currentUser.uid) return; 
                    const u = userDoc.data();
                    
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <div>
                            <strong>${u.name}</strong><br><span style="font-size:11px;color:var(--text-muted);">${u.email}</span>
                        </div>
                        <button class="delete-btn" id="block-btn-${userDoc.id}">
                            ${u.isBlocked ? 'Разблок.' : 'Блок'}
                        </button>
                    `;

                    listContainer.appendChild(item);

                    const currentBtn = document.getElementById(`block-btn-${userDoc.id}`);
                    currentBtn.style.backgroundColor = u.isBlocked ? 'var(--success-color)' : 'var(--error-color)';
                    currentBtn.addEventListener('click', async () => {
                        try {
                            await updateDoc(doc(db, "users", userDoc.id), { isBlocked: !u.isBlocked });
                            loadAdminPanel(); 
                        } catch (blockErr) {
                            alert("Не удалось изменить статус: " + blockErr.message);
                        }
                    });
                });
            } catch (adminPanelErr) {
                console.error("Ошибка обновления списка пользователей:", adminPanelErr);
            }
        }

        // Создание ключа админом
        document.getElementById('add-key-btn').addEventListener('click', async () => {
            const val = document.getElementById('new-key-value').value;
            const type = document.getElementById('new-key-type').value;
            const expiryInput = document.getElementById('new-key-expiry').value;

            if (!val || !expiryInput) return alert("Заполните все поля создания ключа!");

            try {
                const expiryDate = new Date(expiryInput);

                await addDoc(collection(db, "vpn_keys"), {
                    value: val,
                    type: type,
                    expiresAt: expiryDate,
                    userId: ""
                });

                alert("Ключ успешно добавлен!");
                document.getElementById('new-key-value').value = "";
                document.getElementById('new-key-expiry').value = "";
                loadAdminPanel();
            } catch (addKeyErr) {
                alert("Ошибка базы при добавлении ключа: " + addKeyErr.message);
            }
        });
    </script>
</body>
</html>
